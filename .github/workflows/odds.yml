name: Snapshot Polymarket (8/8h)
on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:
jobs:
  odds:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: python3 pipeline/atualiza.py polymarket
      - run: |
          git config user.name "jony-greens-bot"
          git config user.email "actions@github.com"
          git add data/polymarket.json || true
          git diff --cached --quiet || git commit -m "polymarket $(date -u +%FT%H:%M)" && git push
